name: Build and Package Bridge Extension

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: bridge/package.json

      - name: Install dependencies
        run: npm install
        working-directory: bridge

      - name: Type Check
        run: npm run type-check
        working-directory: bridge

      - name: Build extension
        run: npm run build
        working-directory: bridge

      - name: Package extension (Zip)
        run: |
          mv dist bridge-extension
          zip -r bridge-extension.zip bridge-extension/
        working-directory: bridge

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-extension
          path: bridge/bridge-extension.zip

      - name: Release Build (Only on Tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bridge/bridge-extension.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
