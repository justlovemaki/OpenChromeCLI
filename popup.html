<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      background: #f8f9fa;
    }
    .header {
      font-weight: bold;
      margin-bottom: 12px;
      color: #333;
      border-bottom: 1px solid #ddd;
      padding-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .label { color: #666; }
    .value { font-weight: 500; }
    .status-connected { color: #28a745; }
    .status-disconnected { color: #dc3545; }
    .error-box {
      background: #fff5f5;
      color: #c92a2a;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-top: 8px;
      border: 1px solid #ffc9c9;
      display: none;
      word-break: break-all;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      margin-top: 12px;
      transition: background 0.2s;
    }
    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="header">
    <span>Agent Bridge</span>
  </div>
  
  <div class="status-row">
    <span class="label">Status:</span>
    <span id="status-val" class="value status-disconnected">Checking...</span>
  </div>
  
  <div class="status-row">
    <span class="label">Port:</span>
    <span id="port-val" class="value">-</span>
  </div>

  <div id="error-val" class="error-box"></div>

  <button id="reconnect-btn">Reconnect Bridge</button>

  <script src="popup.js"></script>
</body>
</html>
